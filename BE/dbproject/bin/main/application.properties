spring.application.name=dbproject

# Oracle DB 연결 설정
# 본인의 오라클 포트(기본 1521)와 SID(기본 xe 또는 orcl)에 맞게 확인해주세요.
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=d202302618
spring.datasource.password=3016
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA 설정 (DB와 자바 코드를 연결해주는 마법사)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# 이미 SQL Developer에서 테이블(DDL)을 만들었으므로 none으로 설정
spring.jpa.hibernate.ddl-auto=none
# 콘솔창에 실행되는 SQL 쿼리를 예쁘게 보여줌
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 파일 업로드 설정 (BLOB 직접 저장)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB