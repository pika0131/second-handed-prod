name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'FE/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'FE/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FE/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FE/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # tsc -b 가 npm run build("tsc -b && vite build") 안에 포함되어 있으므로 별도 타입체크 불필요
      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: FE/frontend/dist/
          retention-days: 7
